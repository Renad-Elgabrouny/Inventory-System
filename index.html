<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suppliers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <script src="jquery-3.7.1.js"></script>
</head>
<body>
    <div>
        <form action="" class="addSupplier">
        <input type="text" name="ssc" id="ssc" placeholder="Social Security Number">
        <input type="text" name="name" id="name" placeholder="Name">
        <input type="text" name="phone" id="phone" placeholder="Phone">
        <!-- <input type="email" name="email" id="email" placeholder="Email"> -->
        <input type="email" name="email" id="email" placeholder="Email">
        <input type="text" name="continent" id="continent" placeholder="Continent">
        <input type="text" name="country" id="country" placeholder="Country">
        <input type="text" name="city" id="city" placeholder="City">
        <input type="text" name="street" id="street" placeholder="Street">
        <input type="submit" value="Submit" class="submit">
        <input type="submit" value="Modify" class="modify">
        <input type="reset" value="Reset" class="reset">
    </form>
    </div>
    <div class="container w-100 py-4 px-3">
        <div class="one d-flex flex-column flex-md-row justify-content-between align-items-center px-3 py-2">
            <p class="sup fs-1 fw-bold display-1">Suppliers</p>
            <div class="right d-flex gap-3">
                <input type="search" name="supplier" id="supplier" placeholder="Search Supplier">
                <input type="button" value="Add Supplier" id="addbutt">
            </div>
        </div>
        <div class="two">
            <div class="first table-responsive">
                <table class="table suppdata bg-white rounded-4 border border-dark px-3 py-0 mw-100">
                    <thead>
                        <tr class="names">
                            <th>SSC</th>
                            <th>Name</th>
                            <th>Phone</th>
                            <th>Email</th>
                            <th>Continent</th>
                            <th>Country</th>
                            <th>City</th>
                            <th>Street</th>
                            <th>Update</th>
                            <th>Delete</th>
                        </tr>
                    </thead>
                </table>
            </div>
        </div>
    </div>
    <!-- type="module" -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./app.js"></script>
</body>
</html>
