<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suppliers</title>
    <link rel="stylesheet" href="./style.css">
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"> -->
    <script src="jquery-3.7.1.js"></script>
</head>
<body>
    <div class="content d-flex justify-content-center align-items-center">
        <form action="" class="addSupplier">
        <input type="text" name="ssc" id="ssc" placeholder="Social Security Number">
        <input type="text" name="name" id="name" placeholder="Name">
        <input type="text" name="phone" id="phone" placeholder="Phone">
        <!-- <input type="email" name="email" id="email" placeholder="Email"> -->
        <input type="email" name="email" id="email" placeholder="Email">
        <input type="text" name="continent" id="continent" placeholder="Continent">
        <input type="text" name="country" id="country" placeholder="Country">
        <input type="text" name="city" id="city" placeholder="City">
        <input type="text" name="street" id="street" placeholder="Street">
        <input type="submit" value="Submit" class="submit">
        <input type="submit" value="Modify" class="modify">
        <input type="reset" value="Reset" class="reset">
    </form>
    </div>
    <div class="container">
        <div class="one">
            <h1 class="sup">Suppliers</h1>
            <div class="right">
                <input type="search" name="supplier" id="supplier" placeholder="Search Supplier">
                <input type="button" value="Add Supplier" id="addbutt">
            </div>
        </div>
        <div class="two">
            <div class="first">
                <table class="suppdata">
                    <thead>
                        <tr class="names">
                            <th>Social Security Number</th>
                            <th>Name</th>
                            <th>Phone</th>
                            <th>Email</th>
                            <th>Continent</th>
                            <th>Country</th>
                            <th>City</th>
                            <th>Street</th>
                            <th>Update</th>
                            <th>Delete</th>
                        </tr>
                    </thead>
                </table>
            </div>
        </div>
    </div>
    <script src="./app.js"></script>
    <!-- type="module" -->
    <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script> -->
</body>
</html>
