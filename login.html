<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      .bg-gradient-purple {
        background: linear-gradient(135deg, #ffffff, #bf9ede);
      }

      .feature-box {
        background: rgba(255, 255, 255, 0.15);
      }

      .small-text {
        font-size: 14px;
        color: #e5e7eb;
      }
      .color-btn {
        background-color: #8b5cf6;
      }
    </style>
  </head>

  <body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar bg-white shadow-sm px-4">
      <div class="container-fluid d-flex justify-content-between">
        <div class="d-flex align-items-center gap-2">
          <img src="./assets/Images/login-navbar-icon.png" width="35" />
          <span class="fw-bold">Inventory System</span>
        </div>
        <span class="text-muted small">Inventory Management Solutions</span>
      </div>
    </nav>

    <!-- Main -->
    <div
      class="container vh-80 mt-5 d-flex align-items-center justify-content-center w-90"
    >
      <div class="card shadow-lg rounded-4 overflow-hidden w-90">
        <div class="row g-0">
          <!-- RIGHT -->
          <div
            class="col-lg-6 d-none d-lg-flex flex-column bg-gradient-purple text-white p-5"
          >
            <img src="./assets/Images/navbaricon.png" width="50" class="mb-3" />

            <h4 class="fw-bold" style="color: black">Smart Inventory</h4>
            <h4 class="fw-bold" style="color: #8b5cf6">Management.</h4>
            <p class="text-muted">
              Real-time tracking, automated restocking, and comprehensive
              analytics for your warehouse.
            </p>
          </div>
          <!-- Login part -->
          <div class="col-lg-6 p-4 p-md-5 bg-white">
            <h3 class="fw-bold">Welcome Back</h3>
            <p class="text-muted mb-4">
              Login to manage your inventory dashboard.
            </p>

            <!-- Email -->
            <div class="mb-3">
              <label class="form-label badge text-dark">Email Address</label>
              <input
                type="email"
                class="form-control email-user-login"
                placeholder="name@company.com"
              />
            </div>

            <!-- Password -->
            <div class="mb-3">
              <label class="form-label badge text-dark">Password</label>
              <input
                type="password"
                class="form-control pass-user-login"
                placeholder="Enter your password"
              />
              <div class="text-danger small login-error"></div>
            </div>

            <button
              class="btn w-100 text-white mt-4 create-account-btn color-btn btn-outline-primary login"
            >
              Login to Dashboard →
            </button>

            <p class="text-center mt-3 small">
              Don't have an account?
              <a href="#" class="text-decoration-none register">Register</a>
            </p>
          </div>
        </div>
      </div>
    </div>
    <script src="./js/pages/login.js" type="module"></script>
  </body>
</html>
