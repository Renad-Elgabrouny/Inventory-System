<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory-Mangement - Orders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/orders.css">
</head>

<body class="bg-light">

    <div class="container-fluid px-0">
        <div class="row g-0 min-vh-100">
            <div class="col-lg-2 d-none d-lg-flex flex-column bg-white border-end p-3">
                <div class="d-flex align-items-center mb-4 ps-2">
                    <i class="fa-solid fa-layer-group fs-4" style="color:#6f42c1"></i>
                    <div class="ms-2">
                        <p class="mb-0 fw-bold">Inventory Managment System</p>

                    </div>
                </div>
                <div class="input-group mb-3 px-2">
                    <span class="input-group-text bg-light border-0"><i
                            class="fa-solid fa-magnifying-glass text-muted small"></i></span>
                    <input type="text" class="form-control bg-light border-0 small" placeholder="Search menu...">
                </div>

                <div class="nav flex-column gap-2 flex-grow-1">
                    <div class="nav-link text-muted p-2 rounded sidebar-item">
                        <i class="fa-solid fa-house me-2"></i> Overview
                    </div>
                    <div class="nav-link text-muted p-2 rounded sidebar-item">
                        <i class="fa-solid fa-box me-2"></i> Products
                    </div>
                    <div class="nav-link text-muted p-2 rounded sidebar-item">
                        <i class="fa-solid fa-users me-2"></i> Suppliers
                    </div>
                    <div class="nav-link p-2 rounded active-item fw-semibold"
                        style="background-color: #e6ccff; color: #6f42c1;">
                        <i class="fa-solid fa-cart-shopping me-2"> </i> Orders
                    </div>
                    <div class="nav-link text-muted p-2 rounded sidebar-item">
                        <i class="fa-solid fa-chart-column me-2"></i> Reports
                    </div>
                    <div class="nav-link text-muted p-2 rounded sidebar-item">
                        <i class="fa-solid fa-clock-rotate-left me-2"></i> Activity Log
                    </div>
                    <div class="nav-link text-muted p-2 rounded sidebar-item">
                        <i class="fa-solid fa-gear me-2"></i> Settings
                    </div>
                </div>

                <div class="mt-auto p-3 bg-light rounded d-flex align-items-center">
                    <!-- <img src="" class="rounded-circle" width="32"> -->
                    <div class="ms-2 overflow-hidden">
                        <p class="mb-0 fw-bold small text-truncate">Fatma</p>
                        <p class="mb-0 text-muted small text-truncate" style="font-size: 11px;">Admin</p>
                    </div>
                    <i class="fa-solid fa-arrow-right-from-bracket ms-auto text-muted small"></i>
                </div>
            </div>

            <div class="col-lg-10 d-flex flex-column">

                <header class="bg-white border-bottom px-4 py-3 d-flex justify-content-between align-items-center">
                    <h4 class="mb-0 fw-bold">Purchase Orders</h4>
                    <div class="d-flex gap-2">
                        <button class="btn btn-primary px-4 d-flex align-items-center"
                            onclick="window.openCreateModal()">
                            <i class="fa-solid fa-plus me-2"></i> Create New PO
                        </button>
                        
                    </div>
                </header>

                <div class="p-4 pb-0">
                    <div class="row g-3 align-items-center mb-4">
                        <div class="col-md-6">
                            <div class="input-group bg-white border rounded px-2 align-items-center shadow-sm">
                                <i class="fa-solid fa-magnifying-glass text-muted me-2"></i>
                                <input type="text" class="form-control border-0 shadow-none py-2"
                                    placeholder="Search by product, ID or supplier...">
                            </div>
                        </div>
                        <div class="col-md-3">
                            <select class="form-select border shadow-sm py-2">
                                <option selected>Status: All</option>
                                <option value="pending">Pending</option>
                                <option value="received">Received</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <select class="form-select border shadow-sm py-2">
                                <option selected>Supplier: All</option>
                            </select>
                        </div>
                    </div>

                    <div class="card border-0 shadow-sm rounded-3 overflow-hidden">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="bg-light border-bottom">
                                    <tr class="text-muted small text-uppercase">
                                        <th class="ps-4 py-3">Order ID</th>
                                        <th>Supplier</th>
                                        <th>Product</th>
                                        <th>Quantity</th>
                                        <th>Status</th>
                                        <th>Date</th>
                                        <th class="text-end pe-4">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="tbody" class="border-top-0">
                                </tbody>
                            </table>
                        </div>
                        <div
                            class="card-footer bg-white border-top py-3 px-4 d-flex justify-content-between align-items-center">
                            <small class="text-muted">SHOWING 1 TO 3 OF 3 ORDERS</small>
                            <div class="btn-group">
                                <button class="btn btn-sm btn-outline-secondary"><i
                                        class="fa-solid fa-chevron-left"></i></button>
                                <button class="btn btn-sm btn-outline-secondary"><i
                                        class="fa-solid fa-chevron-right"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="overlay" id="modal" style="display: none;">
        <div class="modal-card bg-white p-4 rounded-3 shadow" style="width: 400px;">
            <h3 id="modalTitle" class="mb-3">New Order</h3>
            <input id="supplierId" class="form-control mb-2" placeholder="Supplier ID" />
            <input id="productId" class="form-control mb-2" placeholder="Product ID" />
            <input id="quantity" class="form-control mb-3" placeholder="Quantity" type="number" />
            <div class="d-flex gap-2">
                <button class="btn btn-secondary flex-grow-1" onclick="window.closeModal()">Cancel</button>
                <button class="btn btn-primary flex-grow-1" onclick="window.saveOrder()">Save</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/pages/orders.js"></script>


</body>

</html>
