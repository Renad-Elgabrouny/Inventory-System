<link rel="stylesheet" href="../assets/css/report.css" />
<div
  class="container d-flex flex-column my-1 p-4 gap-3"
  style="background-color: rgba(248, 250, 252, 1)"
>
  <div
    class="header d-flex flex-row justify-content-between align-items-center"
  >
    <div class="left d-flex flex-column">
      <h1>Inventory Reports</h1>
      <p>view detailed analytics and stock status</p>
    </div>

  </div>
  <div class="two d-flex flex-column">
    <div class="one d-flex flex-row justify-content-between align-items-center">
      <div class="left"><p class="fw-bold">Low Stock Report</p></div>
    </div>
    <div class="two">
      <table class="lowProducts">
        <thead>
          <tr>
            <th>Product Name</th>
            <th>Current Quantity</th>
            <th>Reorder Level</th>
            <th>Supplier</th>
            <!-- <th>Action</th> -->
          </tr>
        </thead>
      </table>
    </div>
  </div>
  <div class="three d-flex flex-column">
    <div class="one">
      <p style="font-weight: bold">Inventory Value Report</p>
    </div>
    <div class="two">
      <table class="tableTwo">
        <thead>
          <tr>
            <th>Product Name</th>
            <th>Quantity ON Hand</th>
            <th>Unit Price</th>
            <th>Total Value</th>
          </tr>
        </thead>
      </table>
    </div>
    <div
      class="three d-flex flex-row justify-content-between align-items-center"
    >
      <div class="left">
        <p style="font-weight: bold">Grand Total (Full Inventory)</p>
      </div>
      <div class="total">
        <p style="font-weight: bold; color: #9333ea">$248.500.00</p>
      </div>
    </div>
  </div>
</div>
